apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sandbox-connector.fullname" . }}
  labels:
    {{- include "sandbox-connector.labels" . | nindent 4 }}
data:
  application.yaml: |
    spring:
      application:
        name: sandbox-connector
      profiles:
        active: ${SPRING_PROFILES_ACTIVE:production}
    
    server:
      port: 8080
      shutdown: graceful
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus,metrics
      endpoint:
        health:
          show-details: when_authorized
          probes:
            enabled: true
      health:
        livenessState:
          enabled: true
        readinessState:
          enabled: true
    
    sandbox:
      enabled: {{ .Values.config.sandbox.enabled }}
      nsjailPath: {{ .Values.config.sandbox.nsjailPath }}
      workspaceBase: {{ .Values.config.sandbox.workspaceBase }}
      toolsDirectory: {{ .Values.config.sandbox.toolsDirectory }}
      seccompProfilesDirectory: {{ .Values.config.sandbox.seccompProfilesDirectory }}
      sandboxRootfs: {{ .Values.config.sandbox.sandboxRootfs }}
      defaultTenantId: {{ .Values.config.sandbox.defaultTenantId }}
      
      execution:
        threadPoolSize: {{ .Values.config.execution.threadPoolSize }}
        queueSize: {{ .Values.config.execution.queueSize }}
        defaultTimeoutSeconds: {{ .Values.config.execution.defaultTimeoutSeconds }}
        maxTimeoutSeconds: {{ .Values.config.execution.maxTimeoutSeconds }}
        gracePeriodSeconds: {{ .Values.config.execution.gracePeriodSeconds }}
        defaultMemoryMb: {{ .Values.config.execution.defaultMemoryMb }}
        maxMemoryMb: {{ .Values.config.execution.maxMemoryMb }}
        maxOutputBytes: {{ .Values.config.execution.maxOutputBytes }}
        
      security:
        strictMode: {{ .Values.config.security.strictMode }}
        allowShellFeatures: {{ .Values.config.security.allowShellFeatures }}
        dropAllCapabilities: {{ .Values.config.security.dropAllCapabilities }}
        useUserNamespace: {{ .Values.config.security.useUserNamespace }}
        useNetworkNamespace: {{ .Values.config.security.useNetworkNamespace }}
        usePidNamespace: {{ .Values.config.security.usePidNamespace }}
        useMountNamespace: {{ .Values.config.security.useMountNamespace }}
        sandboxUid: {{ .Values.config.security.sandboxUid }}
        sandboxGid: {{ .Values.config.security.sandboxGid }}
        
      metrics:
        enabled: {{ .Values.config.metrics.enabled }}
        prefix: {{ .Values.config.metrics.prefix }}
        includeTenantTag: {{ .Values.config.metrics.includeTenantTag }}
        includeCommandTag: {{ .Values.config.metrics.includeCommandTag }}
