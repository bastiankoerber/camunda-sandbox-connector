  # Python 3 - Python interpreter (SECURED via wrapper)
  # The safe-python3 wrapper blocks dangerous imports and operations:
  # - Process execution (os, subprocess, pty)
  # - Network access (socket, urllib, requests)
  # - System access (ctypes, multiprocessing, threading)
  # - Code execution (exec, eval, __import__)
  # - Serialization (pickle, marshal)
  # Only inline code (-c) is allowed, no file execution
  python3:
    name: python3
    displayName: Python 3 (Secured)
    description: Secured Python 3 interpreter - blocks dangerous imports (os, subprocess, socket, etc.)
    version: "3.11"
    category: scripting
    installMethod: SYSTEM
    installUrl: ""
    binaryPath: /bin/safe-python3
    checksum: ""
    allowedSubcommands: []
    blockedSubcommands: []
    allowedFlags:
      - -c  # Inline code only
    blockedFlags:
      - -i  # Interactive mode not allowed
      - -m  # Module mode handled by wrapper with allowlist
    requiresAuth: false
    authEnvVars: []
    resourceLimits:
      maxMemoryMb: 256
      maxCpuPercent: 25
      maxExecutionSeconds: 60
    seccompProfile: strict
    # Allowed modules when using -m flag (via wrapper)
    allowedModules:
      - json
      - math
      - datetime
      - re
      - string
      - collections
      - itertools
      - functools
      - operator
      - decimal
      - fractions
      - statistics
      - random
      - base64
      - hashlib
      - hmac
      - html
      - csv
      - textwrap
      - difflib
      - enum
      - dataclasses
      - typing
      - copy
      - pprint
      - uuid
    # Blocked module patterns (checked by wrapper)
    blockedModulePatterns:
      - os
      - subprocess
      - socket
      - urllib
      - requests
      - http
      - ctypes
      - multiprocessing
      - threading
      - pickle
      - marshal
      - shutil
      - tempfile
      - importlib
      - builtins
      - signal
      - resource
      - fcntl
      - mmap
      - pty
      - asyncio
      - aiohttp

