# Tool Registry - Defines allowlisted CLI tools and their configurations
# Each tool must be explicitly defined here to be available for execution
#
# IMPORTANT: Checksum Verification for Production Deployment
# ===========================================================
# All tool binaries MUST have valid SHA256 checksums to prevent supply chain attacks.
# The checksums below are placeholders that MUST be replaced with actual values before
# production deployment.
#
# To compute the SHA256 checksum for a binary:
#
#   Linux/macOS:
#     sha256sum /path/to/binary
#     # or
#     shasum -a 256 /path/to/binary
#
#   Example:
#     $ sha256sum aws
#     e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855  aws
#
# The checksum format in this file should be:
#   checksum: sha256:<64-character-hex-string>
#
# For zip/tar archives, compute the checksum of the archive file BEFORE extraction.
# The ToolInstaller will verify the checksum after download but before extraction.
#
# NOTE: Never deploy to production with "placeholder" checksums - the installer
# will reject tools with invalid checksums in strict mode.

tools:
  # AWS CLI - Amazon Web Services command-line interface
  aws:
    name: aws
    displayName: AWS CLI
    description: Amazon Web Services command-line interface
    version: "2.15.0"
    category: cloud
    installMethod: BINARY
    installUrl: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
    binaryPath: /opt/tools/aws/aws
    checksum: sha256:placeholder-update-with-actual-checksum
    allowedSubcommands:
      - s3
      - s3api
      - ec2
      - iam
      - lambda
      - sts
      - cloudformation
      - dynamodb
      - sqs
      - sns
    blockedSubcommands:
      - iam delete-user
      - iam delete-role
      - ec2 terminate-instances
      - s3 rb  # remove bucket
    allowedFlags:
      - --region
      - --output
      - --profile
      - --query
      - --no-paginate
      - --dry-run
    blockedFlags:
      - --debug  # Can expose sensitive info
    requiresAuth: true
    authEnvVars:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
    resourceLimits:
      maxMemoryMb: 512
      maxCpuPercent: 50
      maxExecutionSeconds: 300
    seccompProfile: permissive  # Cloud CLIs need additional syscalls

