# Tool categories for grouping and policy application
categories:
  cloud:
    description: Cloud provider CLI tools
    defaultSeccompProfile: default
    defaultNetworkAccess: true
  container:
    description: Container and orchestration tools
    defaultSeccompProfile: strict
    defaultNetworkAccess: true
  iac:
    description: Infrastructure as Code tools
    defaultSeccompProfile: default
    defaultNetworkAccess: true
  utility:
    description: General utility tools
    defaultSeccompProfile: strict
    defaultNetworkAccess: false

# Global settings
settings:
  # Default resource limits if not specified per-tool
  defaultResourceLimits:
    maxMemoryMb: 256
    maxCpuPercent: 25
    maxExecutionSeconds: 120
  
  # Tool installation directory
  toolsBaseDir: /opt/tools
  
  # Cache settings
  cacheEnabled: true
  cacheTtlHours: 24
  
  # Checksum verification
  verifyChecksums: true
  
  # Allow custom tool versions per tenant
  allowTenantVersionOverride: false
