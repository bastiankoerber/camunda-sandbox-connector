# Default nsjail configuration for sandbox CLI connector
# This configuration provides a secure, isolated environment for command execution

name: "sandbox-cli-default"
description: "Default sandbox configuration for CLI tool execution"

# Execution mode
mode: ONCE

# Hostname for the sandboxed environment
hostname: "sandbox"

# Time limit in seconds (0 = unlimited, but we enforce limits in code)
time_limit: 300

# Resource limits
rlimit_as_type: HARD
rlimit_as: 512      # Address space limit in MB
rlimit_core_type: HARD
rlimit_core: 0      # No core dumps
rlimit_cpu_type: HARD  
rlimit_cpu: 60      # CPU time limit in seconds
rlimit_fsize_type: HARD
rlimit_fsize: 64    # Max file size in MB
rlimit_nofile_type: HARD
rlimit_nofile: 256  # Max open file descriptors
rlimit_nproc_type: HARD
rlimit_nproc: 64    # Max number of processes
rlimit_stack_type: HARD
rlimit_stack: 8     # Stack size limit in MB

# Cgroups v2 configuration
use_cgroupv2: true
cgroupv2_mount: "/sys/fs/cgroup"
detect_cgroupv2: true

# Memory limits via cgroups
cgroup_mem_max: 536870912         # 512MB
cgroup_mem_memsw_max: 536870912   # 512MB (including swap)
cgroup_mem_swap_max: 0            # No swap

# CPU limits via cgroups  
cgroup_cpu_ms_per_sec: 500        # 50% of one CPU core

# PID limits via cgroups
cgroup_pids_max: 64               # Max PIDs in sandbox

# Enable namespaces for isolation
clone_newnet: false               # Network access controlled separately
clone_newuser: true               # User namespace for privilege separation
clone_newns: true                 # Mount namespace
clone_newpid: true                # PID namespace
clone_newipc: true                # IPC namespace
clone_newuts: true                # UTS namespace (hostname)
clone_newcgroup: true             # Cgroup namespace

# Keep capabilities minimal
keep_caps: false
cap: []

# Run as nobody user inside sandbox
uid_mapping {
  inside_id: "65534"    # nobody
  outside_id: ""        # Will be set dynamically to connector user
  count: 1
}

gid_mapping {
  inside_id: "65534"    # nogroup
  outside_id: ""        # Will be set dynamically to connector group
  count: 1
}

# Mount points - minimal filesystem
mount {
  src: "/opt/tools"
  dst: "/opt/tools"
  is_bind: true
  rw: false
  is_dir: true
  mandatory: true
}

mount {
  src: "/lib"
  dst: "/lib"
  is_bind: true
  rw: false
  is_dir: true
  mandatory: false
}

mount {
  src: "/lib64"
  dst: "/lib64"
  is_bind: true
  rw: false
  is_dir: true
  mandatory: false
}

mount {
  src: "/usr/lib"
  dst: "/usr/lib"
  is_bind: true
  rw: false
  is_dir: true
  mandatory: false
}

mount {
  src: "/usr/bin"
  dst: "/usr/bin"
  is_bind: true
  rw: false
  is_dir: true
  mandatory: false
}

mount {
  src: "/bin"
  dst: "/bin"
  is_bind: true
  rw: false
  is_dir: true
  mandatory: false
}

# /etc files needed for basic operation
mount {
  src: "/etc/ssl"
  dst: "/etc/ssl"
  is_bind: true
  rw: false
  is_dir: true
  mandatory: false
}

mount {
  src: "/etc/ca-certificates"
  dst: "/etc/ca-certificates"
  is_bind: true
  rw: false
  is_dir: true
  mandatory: false
}

mount {
  src: "/etc/resolv.conf"
  dst: "/etc/resolv.conf"
  is_bind: true
  rw: false
  is_dir: false
  mandatory: false
}

mount {
  src: "/etc/hosts"
  dst: "/etc/hosts"
  is_bind: true
  rw: false
  is_dir: false
  mandatory: false
}

mount {
  src: "/etc/nsswitch.conf"
  dst: "/etc/nsswitch.conf"
  is_bind: true
  rw: false
  is_dir: false
  mandatory: false
}

mount {
  src: "/etc/passwd"
  dst: "/etc/passwd"
  is_bind: true
  rw: false
  is_dir: false
  mandatory: false
}

mount {
  src: "/etc/group"
  dst: "/etc/group"
  is_bind: true
  rw: false
  is_dir: false
  mandatory: false
}

# /tmp for temporary files (tmpfs, not host)
mount {
  dst: "/tmp"
  fstype: "tmpfs"
  rw: true
  is_dir: true
  options: "size=64M,mode=1777"
}

# /dev minimal devices
mount {
  dst: "/dev"
  fstype: "tmpfs"
  rw: true
  is_dir: true
  options: "size=8M,mode=755"
}

mount {
  src: "/dev/null"
  dst: "/dev/null"
  is_bind: true
  rw: true
  is_dir: false
  mandatory: true
}

mount {
  src: "/dev/zero"
  dst: "/dev/zero"
  is_bind: true
  rw: false
  is_dir: false
  mandatory: true
}

mount {
  src: "/dev/urandom"
  dst: "/dev/urandom"
  is_bind: true
  rw: false
  is_dir: false
  mandatory: true
}

mount {
  src: "/dev/random"
  dst: "/dev/random"
  is_bind: true
  rw: false
  is_dir: false
  mandatory: false
}

# /proc - limited
mount {
  dst: "/proc"
  fstype: "proc"
  rw: false
  is_dir: true
}

# Seccomp configuration - use strict profile by default for maximum security
# Available profiles: default.json (strict), permissive.json (cloud CLIs), network.json
seccomp_policy_file: "/etc/nsjail/seccomp/default.json"

# Environment variables to pass (will be set dynamically)
# env: "PATH=/usr/bin:/bin:/opt/tools"
# env: "HOME=/tmp"
# env: "TERM=xterm"

# Working directory
cwd: "/tmp"

# Logging
silent: false
skip_setsid: false
stderr_to_null: false

# Security options
disable_proc: false
proc_path: "/proc"
disable_no_new_privs: false

# Personality flags
persona_addr_compat_layout: false
persona_mmap_page_zero: false
persona_read_implies_exec: false
persona_addr_limit_3gb: false
persona_addr_no_randomize: false
